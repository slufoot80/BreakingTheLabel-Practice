<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice — Breaking the Label</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="practice-body">
    <nav>
        <a href="index.html" class="logo">Breaking<span>theLabel</span></a>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#books">Books</a></li>
        </ul>
    </nav>

    <main class="practice-main">
        <div class="container">
            <div class="kid-bar">
                <label for="kid-name">Who's practicing?</label>
                <input type="text" id="kid-name" placeholder="First name" maxlength="20">
                <span id="kid-greeting" class="kid-greeting"></span>
            </div>

            <!-- View: Grade picker -->
            <section id="view-grades">
                <h2 class="view-title">Pick your grade</h2>
                <p class="view-sub">Don't be afraid to try a higher grade to challenge yourself!</p>
                <div id="grade-grid" class="grade-grid"></div>
            </section>

            <!-- View: Topic list -->
            <section id="view-topics" style="display:none;">
                <button class="back-btn" id="back-to-grades">← All grades</button>
                <h2 class="view-title" id="topics-grade-title"></h2>
                <p class="view-sub" id="topics-grade-summary"></p>
                <div id="topics-list" class="topics-list"></div>
            </section>

            <!-- View: Exercise -->
            <section id="view-exercise" style="display:none;">
                <button class="back-btn" id="back-to-topics">← All topics</button>
                <div class="exercise-header">
                    <span class="exercise-grade" id="exercise-grade"></span>
                    <h2 id="exercise-topic-title"></h2>
                    <div class="exercise-meta">
                        <span id="exercise-progress"></span>
                        <span id="exercise-score"></span>
                    </div>
                </div>
                <div id="exercise-card" class="exercise"></div>
                <div class="exercise-actions">
                    <button class="btn btn-primary" id="exercise-next" style="display:none;">Next question →</button>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <div class="container">
            <p class="footer-links">
                <a href="index.html#books">Paul Geise's books</a> ·
                <a href="https://slufoot80.github.io/SafePulse/" target="_blank" rel="noopener">SafePulse safety app</a> ·
                <a href="index.html">Home</a>
            </p>
        </div>
    </footer>

    <script src="app.js"></script>
    <script>BTL.initPracticePage();</script>
</body>
</html>
